{% comment %} Test template for the chatbox, mostly made with AI for quick testing {% endcomment %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Chatbox</title>
</head>
<body>
    <p>Logged in as: <strong>{{ user.username|default:"Anonymous" }}</strong></p>
    <button id="connectBtn">Connect</button>
    <ul id="messageList"></ul>

    <div style="margin-top: 20px;">
        <input type="text" id="messageInput" placeholder="Write a message...">
        <button id="sendBtn">Send</button>
    </div>

    <script>
        const button = document.getElementById('connectBtn');
        const list = document.getElementById('messageList');
        const sendBtn = document.getElementById('sendBtn');
        const input = document.getElementById('messageInput');

        function sortMessages(messages) {
            return messages.sort((a, b) => new Date(a.created_time) - new Date(b.created_time));
        }

        async function getData() {
            const url = "/chatbox/messages/";
            let result = [];
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Response status: ${response.status}`);
                }

                result = await response.json();
                console.log(result);
            } catch (error) {
                console.error(error.message);
            }
            return result;
        }

        button.addEventListener('click', async () => {
            const response = await getData();
            const sortedMessages = sortMessages(response);

            list.innerHTML = '';

            sortedMessages.forEach(msg => {
                const li = document.createElement('li');
                
                const userSpan = document.createElement('span');
                userSpan.textContent = msg.author.user.username;
                userSpan.style.color = msg.author.name_color;
                
                li.appendChild(userSpan);
                li.appendChild(document.createTextNode(`: ${msg.text}`));
                
                list.appendChild(li);
            });
        });

        sendBtn.addEventListener('click', async () => {
            const message = input.value;
            if (!message) return;

            try {
                const response = await fetch('/chatbox/message/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}', // For auth
                    },
                    body: JSON.stringify({ text: message }),
                });

                if (!response.ok) {
                    throw new Error(`Response status: ${response.status}`);
                }

                input.value = ''; // Clear the input field after sending
            } catch (error) {
                console.error(error.message);
            }
        });
    </script>
</body>
</html>

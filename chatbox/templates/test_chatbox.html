{% comment %} Test template for the chatbox, mostly made with AI for quick testing {% endcomment %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Chatbox</title>
</head>
<body>
    <p>Logged in as: <strong>{{ user.username|default:"Anonymous" }}</strong></p>
    <button id="connectBtn">Connect</button>
    <ul id="messageList"></ul>

    <form id="form">
        <input type="text" name="message" id="messageInput"/>
        <button type="submit" id="sendBtn">Send</button>
    </form>

    <script>
        const connect_button = document.getElementById('connectBtn');
        const list = document.getElementById('messageList');
        let chatSocket = null; // Global variable

        function sortMessages(messages) {
            return messages.sort((a, b) => new Date(a.created_time) - new Date(b.created_time));
        }

        async function getData() {
            const url = "/chatbox/messages/";
            let result = [];
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Response status: ${response.status}`);
                }

                result = await response.json();
                console.log(result);
            } catch (error) {
                console.error(error.message);
            }
            return result;
        }

        connect_button.addEventListener('click', async () => {
            let url = `ws://${window.location.host}/ws/chatbox/`

            chatSocket = new WebSocket(url)

            chatSocket.onmessage = function(e){
                let data = JSON.parse(e.data)
                console.log('Data:', data)

                if (data.type === 'chat_message') {
                    const li = document.createElement('li');
                    const userSpan = document.createElement('span');

                    userSpan.textContent = data.author?.user?.username || "Anonymous";

                    userSpan.style.color = data.author?.name_color || "inherit";

                    li.appendChild(userSpan);

                    const messageText = data.message || data.text || "???";
                    li.appendChild(document.createTextNode(`: ${messageText}`));

                    list.appendChild(li);
                }
            }

            const response = await getData();
            const sortedMessages = sortMessages(response);

            list.innerHTML = '';

            sortedMessages.forEach(msg => {
                const li = document.createElement('li');
                
                const userSpan = document.createElement('span');
                userSpan.textContent = msg.author.user.username;
                userSpan.style.color = msg.author.name_color;
                
                li.appendChild(userSpan);
                li.appendChild(document.createTextNode(`: ${msg.text}`));
                
                list.appendChild(li);
            });
        });

        let form = document.getElementById("form")
        form.addEventListener('submit', (e)=> {
            e.preventDefault()
            let message = e.target.message.value
            if (chatSocket) {
                chatSocket.send(JSON.stringify({
                    'type':'chat_message',
                    'text':message
                }))
                form.reset()
            } else {
                console.log("Not connected yet!");
            }
        })
    </script>
</body>
</html>
